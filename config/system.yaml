# Hot-Box plant / geometry constants
# Shared by controller, sim_in_the_loop, sim_full_raytrace, and (via generated header) firmware.
# Edit this file rather than hardcoding values in Python or C++.

default_site:
  # Diemoz, France
  latitude_deg: 45.5885
  longitude_deg: 5.0904
  altitude_m: 380.0
#  # Berkeley, California
#  latitude_deg: 37.8716
#  longitude_deg: -122.2585
#  altitude_m: 186.0
#  # Gerlach, Nevada
#  latitude_deg: 40.6518
#  longitude_deg: -119.3562
#  altitude_m: 1200.0

# Absorber center O is the world origin XY, at center_height_m on Z.
absorber:
  width_m: 0.40
  height_m: 0.40
  center_height_m: 1.0
  # Oven / absorber face normal in the horizontal plane.
  # 0° = +X east, 90° = +Y north. Changing this rotates the whole plant.
  normal_angle_from_x_deg: 90.0

mirror:
  # Faceted spherical assembly on one alt-az mount
  grid_nx: 3
  grid_ny: 5
  tile_side_m: 0.254
  pitch_m: 0.26035            # tile_side + 0.0254/4
  mount_offset_d_m: 0.1       # |An Mn| along mirror-frame Z (offset between mirrror surface andmount rotation point)
  radius_of_curvature_m: 5.5  # design sphere radius (paraxial focal length ≈ R/2)
  default_oa_distance_m: 2.5  # |O An| horizontal design distance
  default_mount_height_m: 1.0 # An height above ground (world Z)

fleet:
  assembly_count: 3
  # Center-to-center spacing between assemblies along an arc / line [m]
  assembly_spacing_m: 1.0
  # Design layout: mounts on a horizontal arc in front of the oven back.
  # bearing_deg is relative to absorber.normal_angle_from_x_deg:
  #   0 = straight out along the oven normal; +CCW about +Z (up).
  mounts:
    - node_id: 0
      bearing_deg: 0.0
      oa_distance_m: 2.5
      mount_height_m: 1.0
    - node_id: 1
      bearing_deg: -30.0
      oa_distance_m: 2.5
      mount_height_m: 1.0
    - node_id: 2
      bearing_deg: 30.0
      oa_distance_m: 2.5
      mount_height_m: 1.0

control:
  safe_park_azimuth_deg: 180.0
  safe_park_elevation_deg: 75.0
