<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hot-Box Controller</title>
    <style>
      :root {
        --bg: #101418;
        --panel: #1a2128;
        --text: #e8eef4;
        --muted: #9aa7b5;
        --accent: #f08a4b;
        --est: #7ec8ff;
        --true: #ffd166;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1a2430, var(--bg));
        color: var(--text);
      }
      header, main { padding: 1rem; }
      h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
      p { margin: 0; color: var(--muted); }
      .layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.4fr 1fr;
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
      #scene {
        width: 100%;
        height: min(60vh, 520px);
        display: block;
        border-radius: 12px;
        background: #0b0f13;
      }
      .panel {
        background: color-mix(in srgb, var(--panel) 92%, black);
        border: 1px solid #2a3540;
        border-radius: 12px;
        padding: 0.9rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      button, select {
        background: #24303a;
        color: var(--text);
        border: 1px solid #3a4a58;
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
      }
      button:hover { border-color: var(--accent); }
      .legend { display: flex; gap: 1rem; margin: 0.5rem 0 0; font-size: 0.9rem; color: var(--muted); }
      .swatch { display: inline-block; width: 0.8rem; height: 0.8rem; border-radius: 2px; margin-right: 0.3rem; vertical-align: middle; }
      .swatch.est { background: var(--est); }
      .swatch.true { background: var(--true); }
      pre {
        margin: 0;
        max-height: 40vh;
        overflow: auto;
        font-size: 0.75rem;
        white-space: pre-wrap;
      }
      .status-row { display: grid; gap: 0.4rem; margin-bottom: 0.75rem; }
      .pill {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        background: #2a3642;
        font-size: 0.8rem;
      }
      #scene-status { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/static/vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>Hot-Box Controller</h1>
      <p>Estimated vs true geometry, GPS status, and mirror controls.</p>
    </header>
    <main>
      <div class="layout">
        <section class="panel">
          <canvas id="scene"></canvas>
          <div id="scene-status">Loading 3D viewer…</div>
          <div class="legend">
            <span><span class="swatch est"></span>estimated</span>
            <span><span class="swatch true"></span>true (sim)</span>
          </div>
          <div class="controls" style="margin-top: 0.75rem;">
            <button id="btn-home">Home</button>
            <button id="btn-park">Park</button>
            <button id="btn-auto">Auto track</button>
            <select id="mirror-select">
              <option value="0">Mirror 0</option>
              <option value="1">Mirror 1</option>
              <option value="2">Mirror 2</option>
            </select>
            <button id="btn-jog-left">Jog −az</button>
            <button id="btn-jog-right">Jog +az</button>
            <button id="btn-jog-up">Jog +el</button>
            <button id="btn-jog-down">Jog −el</button>
            <button id="btn-jog-stop">Stop jog</button>
          </div>
        </section>
        <section class="panel">
          <div class="status-row">
            <div>Mode: <span class="pill" id="mode-pill">…</span></div>
            <div>GPS: <span class="pill" id="gps-pill">…</span></div>
            <div>Sun el: <span class="pill" id="sun-pill">…</span></div>
          </div>
          <pre id="state">loading...</pre>
        </section>
      </div>
    </main>

    <!-- Status + controls work even if Three.js fails to load. -->
    <script>
      window.hotboxLatestState = null;
      window.hotboxOnState = null;

      async function post(path, body = {}) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          throw new Error(`${path} failed: ${response.status}`);
        }
      }

      function selectedMirror() {
        return Number(document.getElementById("mirror-select").value);
      }

      document.getElementById("btn-home").onclick = () => post("/api/home").catch(console.error);
      document.getElementById("btn-park").onclick = () => post("/api/park").catch(console.error);
      document.getElementById("btn-auto").onclick = () => post("/api/auto").catch(console.error);
      document.getElementById("btn-jog-left").onclick = () =>
        post("/api/jog", { node_id: selectedMirror(), azimuth_rate_deg_s: -5, elevation_rate_deg_s: 0 }).catch(console.error);
      document.getElementById("btn-jog-right").onclick = () =>
        post("/api/jog", { node_id: selectedMirror(), azimuth_rate_deg_s: 5, elevation_rate_deg_s: 0 }).catch(console.error);
      document.getElementById("btn-jog-up").onclick = () =>
        post("/api/jog", { node_id: selectedMirror(), azimuth_rate_deg_s: 0, elevation_rate_deg_s: 5 }).catch(console.error);
      document.getElementById("btn-jog-down").onclick = () =>
        post("/api/jog", { node_id: selectedMirror(), azimuth_rate_deg_s: 0, elevation_rate_deg_s: -5 }).catch(console.error);
      document.getElementById("btn-jog-stop").onclick = () =>
        post("/api/jog", { node_id: selectedMirror(), azimuth_rate_deg_s: 0, elevation_rate_deg_s: 0 }).catch(console.error);

      async function refreshState() {
        try {
          const response = await fetch("/api/state");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const state = await response.json();
          window.hotboxLatestState = state;
          document.getElementById("state").textContent = JSON.stringify(state, null, 2);
          document.getElementById("mode-pill").textContent = state.mode ?? "?";
          const gps = state.gps || {};
          document.getElementById("gps-pill").textContent = gps.valid
            ? `${gps.source} · ${Number(gps.latitude_deg).toFixed(4)}, ${Number(gps.longitude_deg).toFixed(4)}`
            : `fallback · ${gps.source || "unknown"}`;
          document.getElementById("sun-pill").textContent = `${Number(state.sun?.elevation_deg ?? 0).toFixed(1)}°`;
          if (typeof window.hotboxOnState === "function") {
            window.hotboxOnState(state);
          }
        } catch (err) {
          document.getElementById("state").textContent = `Failed to load /api/state: ${err}`;
        }
      }

      setInterval(refreshState, 1000);
      refreshState();
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "/static/vendor/controls/OrbitControls.js";

      const canvas = document.getElementById("scene");
      const sceneStatus = document.getElementById("scene-status");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0f13);
      const camera = new THREE.PerspectiveCamera(50, 2, 0.1, 200);
      camera.position.set(8, -10, 5);
      const controls = new OrbitControls(camera, canvas);
      controls.target.set(0, 0, 1);
      controls.update();

      scene.add(new THREE.AmbientLight(0xffffff, 0.55));
      const light = new THREE.DirectionalLight(0xffffff, 1.4);
      light.position.set(4, -3, 8);
      scene.add(light);
      scene.add(new THREE.GridHelper(16, 16, 0x334455, 0x223344));

      const absorber = new THREE.Mesh(
        new THREE.BoxGeometry(0.45, 0.12, 0.45),
        new THREE.MeshStandardMaterial({ color: 0xf08a4b })
      );
      absorber.position.set(0, 0, 1);
      scene.add(absorber);

      const sunMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffe08a })
      );
      scene.add(sunMarker);

      const estimatedGroup = new THREE.Group();
      const trueGroup = new THREE.Group();
      scene.add(estimatedGroup);
      scene.add(trueGroup);

      function clearGroup(group) {
        while (group.children.length) {
          const child = group.children.pop();
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        }
      }

      function addRay(group, start, end, color, opacity = 1) {
        const points = [
          new THREE.Vector3(start[0], start[1], start[2]),
          new THREE.Vector3(end[0], end[1], end[2]),
        ];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity });
        group.add(new THREE.Line(geometry, material));
      }

      function addMirror(group, mirror, color) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(0.55, 0.05, 0.4),
          new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.85 })
        );
        mesh.position.set(mirror.mount[0], mirror.mount[1], mirror.mount[2]);
        mesh.rotation.z = THREE.MathUtils.degToRad(mirror.azimuth_deg);
        mesh.rotation.x = THREE.MathUtils.degToRad(mirror.elevation_deg);
        group.add(mesh);

        const facet = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 10, 10),
          new THREE.MeshBasicMaterial({ color })
        );
        facet.position.set(mirror.facet_center[0], mirror.facet_center[1], mirror.facet_center[2]);
        group.add(facet);

        addRay(group, mirror.incoming.start, mirror.incoming.end, color, 0.7);
        addRay(group, mirror.reflected.start, mirror.reflected.end, color, 1.0);
      }

      function renderGeometry(estimated, truth) {
        clearGroup(estimatedGroup);
        clearGroup(trueGroup);
        if (estimated?.mirrors) {
          estimated.mirrors.forEach((mirror) => addMirror(estimatedGroup, mirror, 0x7ec8ff));
          if (estimated.sun?.display_position) {
            const p = estimated.sun.display_position;
            sunMarker.position.set(p[0], p[1], p[2]);
          }
          if (estimated.absorber?.center) {
            const c = estimated.absorber.center;
            absorber.position.set(c[0], c[1], c[2]);
          }
        }
        if (truth?.mirrors) {
          truth.mirrors.forEach((mirror) => addMirror(trueGroup, mirror, 0xffd166));
        }
      }

      function resize() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
      }

      window.hotboxOnState = (state) => {
        renderGeometry(state.geometry?.estimated, state.geometry?.true);
      };
      if (window.hotboxLatestState) {
        window.hotboxOnState(window.hotboxLatestState);
      }

      function render() {
        resize();
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      sceneStatus.textContent = "3D viewer ready";
      render();
    </script>
  </body>
</html>
